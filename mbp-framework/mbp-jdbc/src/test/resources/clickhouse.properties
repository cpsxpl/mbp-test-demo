clickhouse.driver=ru.yandex.clickhouse.ClickHouseDriver
clickhouse.url=jdbc:clickhouse://inner-cpc-tianji-subject.aiclk.com:80?socket_timeout=900000
clickhouse.database=dl_biz
clickhouse.username=default
clickhouse.password=
clickhouse.batchsize=50000
clickhouse.clusters=cpc-tianji-clickhouse
clickhouse.dmpUserCollectTable=dmp_user_collect
clickhouse.dmpUserCollectBm=dmp_user_collect_bm
dmp.user.collect.bm.runParam=0
dmp.user.collect.runParam=3
clickhouse.dmpCvrTable=dmp_cvr
clickhouse.dmpCvrTable.behavior=4
clickhouse.dmpShowTable=dmp_show
clickhouse.dmpShowTable.behavior=2
clickhouse.dmpClickTable=dmp_click
clickhouse.dmpClickTable.behavior=3
clickhouse.dmpDataBm=dmp_data_bm
clickhouse.dmpDataBm.col=day,id,keys,values,daysAgo,behavior,dataType,bit
dmp.data.bm.runParam=1
dmpDataBm.Offline.dataType=1
dmp.rt.data.bm.runParam=2
dmpDataBm.rt.dataType=2
dmpDataBm.daysAgo=1,7,14,30
clickhouse.dmpRtDataTable=dmp_rt_data
##[kepler task]
kepler.dmpShow=dmp_show
kepler.dmpCvr=dmp_cvr
kepler.dmpClick=dmp_click
#基础特征数据任务
kepler.dmpUserCollect=dmp_user_collect
#基础特征数据生成bitmap任务
kepler.dmpUserCollectBm=dmp_user_collect_bm
#实时数据任务
kepler.dmpRtData=dmp_rt_data
#实时数据生成bitmap任务
kepler.dmpRtDataBm=dmp_rt_data_bm
#离线数据生成bitmap任务
kepler.dmpDataBm=dmp_data_bm
